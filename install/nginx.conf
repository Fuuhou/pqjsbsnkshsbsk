user www-data;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 32768;  # Tingkatkan jumlah koneksi per worker
    use epoll;  # Gunakan epoll untuk Linux, lebih efisien pada sistem dengan banyak koneksi
    multi_accept on;  # Menerima beberapa koneksi sekaligus
    accept_mutex on;  # Mengaktifkan mutex untuk menerima koneksi
}

http {
    # General HTTP Settings
    sendfile on;  # Mengaktifkan sendfile untuk efisiensi file serving
    tcp_nopush on;  # Mengoptimalkan pengiriman data
    tcp_nodelay on;  # Mengurangi latensi untuk TCP
    types_hash_max_size 8192;  # Meningkatkan ukuran hash untuk tipe MIME
    # Gzip Configuration
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    # Keepalive settings
    keepalive_timeout 120s;  # Waktu koneksi idle sebelum ditutup
    keepalive_requests 10000;  # Maksimal request per koneksi
    # Hide Nginx version
    server_tokens off;  # Menonaktifkan versi Nginx di header HTTP
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # Log settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    # Client Body and Header Buffer settings
    client_max_body_size 128M;  # Maksimal ukuran body dari request
    client_body_buffer_size 256k;  # Buffer body request
    client_header_buffer_size 32k;  # Buffer header request
    large_client_header_buffers 8 32k;  # Buffer untuk header besar
    # FastCGI settings
    fastcgi_buffer_size 64k;
    fastcgi_buffers 32 64k;
    fastcgi_read_timeout 1800s;  # Timeout untuk membaca FastCGI
    fastcgi_send_timeout 1800s;  # Timeout untuk mengirim data ke FastCGI
    # Proxy settings
    proxy_buffers 32 64k;
    proxy_buffer_size 64k;
    proxy_connect_timeout 600s;
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;
    # Open file cache settings
    open_file_cache max=20000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 3;
    open_file_cache_errors on;
    # Real IP settings for Cloudflare
    ### /// SINGAPORE /// ###
    set_real_ip_from 8.25.96.0/24;
    set_real_ip_from 8.27.69.0/24;
    set_real_ip_from 8.27.79.0/24;
    set_real_ip_from 8.28.20.0/24;
    set_real_ip_from 8.29.105.0/24;
    set_real_ip_from 8.30.234.0/24;
    set_real_ip_from 8.34.202.0/24;
    set_real_ip_from 8.38.147.0/24;
    set_real_ip_from 8.38.148.0/24;
    ### /// INDONESIA /// ###
    set_real_ip_from 8.18.195.0/24;
    ### /// JAPAN /// ###
    set_real_ip_from 8.25.97.0/24;
    set_real_ip_from 8.27.68.0/24;
    set_real_ip_from 8.34.71.0/24;
    set_real_ip_from 8.34.201.0/24;
    set_real_ip_from 8.37.43.0/24;
    set_real_ip_from 183.177.20.208/29;
    set_real_ip_from 193.82.5.64/29;
    set_real_ip_from 193.82.17.40/29;
    set_real_ip_from 210.163.15.168/29;
    set_real_ip_from 58.13.125.192/30;
  	# Random CloudFlare IPv4
  	set_real_ip_from 199.27.128.0/21;
  	set_real_ip_from 173.245.48.0/20;
  	set_real_ip_from 103.21.244.0/22;
  	set_real_ip_from 103.22.200.0/22;
  	set_real_ip_from 103.31.4.0/22;
  	set_real_ip_from 141.101.64.0/18;
  	set_real_ip_from 108.162.192.0/18;
  	set_real_ip_from 190.93.240.0/20;
  	set_real_ip_from 188.114.96.0/20;
  	set_real_ip_from 197.234.240.0/22;
  	set_real_ip_from 198.41.128.0/17;
  	set_real_ip_from 162.158.0.0/15;
  	set_real_ip_from 104.16.0.0/12;
  	
    real_ip_header CF-Connecting-IP;
    # Performance Settings (Adjust buffer and timeout for high traffic)
    # Buffering settings for proxy and FastCGI can be adjusted based on traffic
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cache_zone:10m max_size=1g inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 60m;
    proxy_cache_valid 404 1m;
    # Include additional server configuration files
    include /etc/nginx/conf.d/*.conf;
}